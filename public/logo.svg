<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#8b5cf6"/>
  <circle cx="60" cy="60" r="48" fill="#09090b"/>
  
  <!-- Rumble ring / arena -->
  <circle cx="60" cy="55" r="22" fill="none" stroke="#8b5cf6" stroke-width="4"/>
  
  <!-- Last man standing figure -->
  <rect x="52" y="42" width="16" height="20" rx="3" fill="#8b5cf6"/>
  <!-- Head -->
  <circle cx="60" cy="38" r="6" fill="#8b5cf6"/>
  <!-- Crown / winner -->
  <polygon points="55,32 60,26 65,32" fill="#c084fc"/>
  
  <!-- Coin at feet -->
  <circle cx="60" cy="72" r="8" fill="#c084fc" stroke="#09090b" stroke-width="2"/>
  <text x="60" y="76" text-anchor="middle" fill="#09090b" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">$</text>
  
  <!-- Antenna -->
  <circle cx="60" cy="26" r="3" fill="#8b5cf6"/>
  <line x1="60" y1="29" x2="60" y2="34" stroke="#8b5cf6" stroke-width="2"/>
  
  <!-- Label -->
  <text x="60" y="98" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="15" font-weight="700">RA</text>
</svg>